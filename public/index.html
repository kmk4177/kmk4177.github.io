
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>멀티유저 비눗방울</title>

<style>
html,body{
margin:0;
height:100%;
background:#0b1020;
overflow:hidden;
font-family:system-ui;
}

#ui{
position:fixed;
left:16px;
right:340px;
bottom:16px;
display:flex;
gap:10px;
}

#text{
flex:1;
height:44px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.1);
color:white;
padding:0 14px;
}

#btn{
height:44px;
padding:0 16px;
border-radius:12px;
border:0;
background:#4f8cff;
color:white;
font-weight:700;
}

#sidebar{
position:fixed;
top:12px;
right:12px;
bottom:12px;
width:300px;
border-radius:18px;
background:rgba(255,255,255,0.07);
border:1px solid rgba(255,255,255,0.12);
color:white;
display:flex;
flex-direction:column;
}

#sidebarHeader{
padding:14px;
font-weight:800;
border-bottom:1px solid rgba(255,255,255,0.1);
}

#log{
padding:10px;
overflow:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.logItem{
font-size:12px;
padding:10px;
border-radius:12px;
background:rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div id="sidebar">
<div id="sidebarHeader">건의사항 리스트</div>
<div id="log"></div>
</div>

<div id="ui">
<input id="text" type="text" maxlength="80" placeholder="입력창에 건의사항을 적어주세요 (80자 이내)">
<button id="btn">보내기</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>

<script>

const socket=io();

const {Engine,Render,Runner,Bodies,Composite,Body}=Matter;

const engine=Engine.create();
engine.gravity.y=0;

const render=Render.create({
element:document.body,
engine,
options:{
width:window.innerWidth,
height:window.innerHeight,
wireframes:false,
background:"#0b1020"
}
});

Render.run(render);
Runner.run(Runner.create(),engine);

const balls=new Map();

function spawnBall(spawn){

const x=spawn.nx*window.innerWidth;
const y=spawn.ny*window.innerHeight;
const r=spawn.radius||80;

const ball=Bodies.circle(x,y,r,{restitution:0.95});

Composite.add(engine.world,ball);
balls.set(spawn.id,ball);

Body.setVelocity(ball,{x:spawn.nvx,y:spawn.nvy});
}

socket.on("spawn",spawn=>{

spawnBall(spawn);

const item=document.createElement("div");
item.className="logItem";
item.textContent=spawn.text;
document.getElementById("log").appendChild(item);

});

socket.on("recent",arr=>{

arr.forEach(spawn=>{
spawnBall(spawn);
});

});

document.getElementById("btn").onclick=()=>{

const input=document.getElementById("text");
const text=input.value.trim();
if(!text)return;

socket.emit("submitText",{text});
input.value="";

};

</script>

</body>
</html>
